<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Goggicantiere">
  <title>Goggicantiere</title>
  <link rel="icon" type="image/png" href="logo-monogram.png">
  <link rel="apple-touch-icon" href="logo-monogram.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="splashScreen" class="splash-screen" aria-hidden="true">
    <img src="logo-full.png" alt="Goggicantiere Logo">
  </div>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-head">
        <img class="top-logo" src="logo-monogram.png" alt="Goggicantiere">
        <div>
          <p class="eyebrow">Offline • Baustelle • Handy</p>
          <h1>Goggicantiere</h1>
        </div>
      </div>
      <button id="installBtn" class="ghost hidden" type="button">Installieren</button>
    </header>

    <main>
      <section id="homeView" class="view active">
        <div class="hero card">
          <div>
            <h2>Schnelles Angebot</h2>
            <p>Artikel suchen, auswählen, Gesamtpreis zeigen und drucken/exportieren.</p>
          </div>
          <button id="newOfferBtn" class="primary big" type="button">+ Neues Angebot</button>
        </div>

        <div class="theme-card card compact">
          <div class="row between gap">
            <div>
              <strong>Design</strong>
              <div class="muted">Farben der App</div>
            </div>
            <div class="theme-switch" role="group" aria-label="Design auswählen">
              <button id="themeLightBtn" class="theme-option active" type="button">Hell</button>
              <button id="themeSiteBtn" class="theme-option" type="button">Baustelle</button>
            </div>
          </div>
        </div>

        <div class="card compact">
          <div class="row between gap">
            <div>
              <strong>Aktive Preisliste</strong>
              <div id="activePriceList" class="muted">wird geladen…</div>
            </div>
            <div class="split-actions">
              <button id="importPriceBtn" class="secondary" type="button">Preisliste importieren</button>
              <button id="priceHistoryBtn" class="secondary icon" type="button">⌄</button>
            </div>
          </div>
          <input id="priceFile" class="hidden" type="file" accept=".xls,.csv,.json">
          <input id="offerImportFile" class="hidden" type="file" accept=".json,application/json">
          <div id="priceHistory" class="dropdown hidden"></div>
        </div>

        <div class="card compact">
          <div class="row between gap">
            <strong>Gespeicherte Angebote</strong>
            <button id="exportAllBtn" class="ghost" type="button">Backup</button>
          </div>
          <div id="offerList" class="offer-list"></div>
        </div>
      </section>

      <section id="editView" class="view">
        <div class="sticky-total">
          <button id="backBtn" class="ghost" type="button">←</button>
          <div>
            <div class="muted tiny">Gesamt</div>
            <div id="stickyTotal" class="total">0,00 €</div>
          </div>
          <button id="saveBtn" class="primary" type="button">Speichern</button>
        </div>

        <div class="card form-card">
          <label>Kunde / Baustelle
            <input id="customer" autocomplete="name" placeholder="Name, Ort, Baustelle">
          </label>
          <label>Notiz
            <textarea id="note" rows="2" placeholder="Kurze Beschreibung der Reparatur"></textarea>
          </label>
          <div class="grid2">
            <label>MwSt %
              <input id="vat" inputmode="decimal" value="22">
            </label>
            <label>Preisliste
              <select id="offerPriceList"></select>
            </label>
          </div>
          <button id="applyPriceListBtn" class="secondary full" type="button">Diese Preisliste auf bestehende Positionen anwenden</button>
        </div>

        <div class="search-wrap">
          <div class="article-tools">
            <div class="article-search-row">
              <input id="articleSearch" type="search" placeholder="Artikel suchen… Nummer, Name, Maß">
              <label class="filter-label">Kategorie
                <select id="categoryFilter">
                  <option value="">Alle</option>
                </select>
              </label>
            </div>
            <div class="article-tool-row">
              <button id="showAllArticlesBtn" class="secondary small" type="button">Alle Artikel anzeigen</button>
              <label class="sort-label">Sortieren
                <select id="articleSort">
                  <option value="nr">Artikelnummer</option>
                  <option value="name">ABC</option>
                  <option value="measure">Maß</option>
                </select>
              </label>
            </div>
          </div>
          <div id="searchResults" class="search-results article-list"></div>
        </div>

        <div class="card compact">
          <div class="row between gap">
            <strong>Positionen</strong>
            <button id="manualRowBtn" class="secondary" type="button">+ Manuell</button>
          </div>
          <div id="items" class="items"></div>
        </div>

        <div class="summary card">
          <div><span>Netto</span><strong id="netTotal">0,00 €</strong></div>
          <div><span>MwSt</span><strong id="vatTotal">0,00 €</strong></div>
          <div class="grand"><span>Brutto</span><strong id="grossTotal">0,00 €</strong></div>
        </div>

        <div class="bottom-actions">
          <button id="printBtn" class="primary" type="button">Druckansicht</button>
          <button id="exportOfferBtn" class="secondary" type="button">Export</button>
          <button id="importOfferBtn" class="secondary" type="button">Import</button>
          <button id="deleteOfferBtn" class="danger" type="button">Löschen</button>
        </div>
      </section>

      <section id="printView" class="view print-view">
        <div class="print-actions no-print">
          <button id="closePrintBtn" class="ghost" type="button">← Zurück</button>
          <button id="doPrintBtn" class="primary" type="button">Drucken / PDF</button>
        </div>
        <article id="printDoc" class="print-doc"></article>
      </section>
    </main>
  </div>

  <script src="storage.js"></script>
  <script src="priceLists.js"></script>
  <script src="app.js"></script>
</body>
</html>
